name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: build + release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --no-save

      - name: Build web assets
        run: bun run scripts/build-web.mjs

      - name: Cross-compile binaries (bun)
        env:
          PI_DIFF_RELEASE: "1"
        run: |
          set -euo pipefail
          mkdir -p artifacts
          declare -A TARGETS=(
            [darwin-arm64]=bun-darwin-arm64
            [darwin-x64]=bun-darwin-x64
            [linux-x64]=bun-linux-x64
            [linux-arm64]=bun-linux-arm64
          )
          for target in "${!TARGETS[@]}"; do
            out="artifacts/pi-diff-${target}"
            echo "→ building ${out} (${TARGETS[$target]})"
            bun scripts/build-binary.ts "$out" "${TARGETS[$target]}"
            chmod +x "$out"
          done

      - name: Smoke test linux-x64 binary
        run: |
          ./artifacts/pi-diff-linux-x64 --help
          ./artifacts/pi-diff-linux-x64 --version

      - name: Compute checksums
        run: |
          set -euo pipefail
          cd artifacts
          for f in pi-diff-*; do
            shasum -a 256 "$f" > "$f.sha256"
          done
          shasum -a 256 pi-diff-darwin-arm64 pi-diff-darwin-x64 pi-diff-linux-x64 pi-diff-linux-arm64 > SHA256SUMS
          ls -la

      - name: Resolve tag name
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          files: |
            artifacts/pi-diff-darwin-arm64
            artifacts/pi-diff-darwin-x64
            artifacts/pi-diff-linux-x64
            artifacts/pi-diff-linux-arm64
            artifacts/pi-diff-darwin-arm64.sha256
            artifacts/pi-diff-darwin-x64.sha256
            artifacts/pi-diff-linux-x64.sha256
            artifacts/pi-diff-linux-arm64.sha256
            artifacts/SHA256SUMS
          generate_release_notes: true
          draft: false
          prerelease: false
